<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Yapper{% endblock %}</title>
</head>
<body>
    {% block content %}
    <h1>Yapper</h1>
    {% if logged_in %}
    <p>Logged in as {{ current_user.name }} (ID: {{ current_user.user_id }})</p>
    <p>
        <a href="{% url 'conversations' %}">Go to conversations</a>
        |
        <a href="{% url 'logout' %}">Logout</a>
    </p>
    {% else %}
    <p>
        <a href="{% url 'login' %}">Login</a>
        |
        <a href="{% url 'register' %}">Register</a>
    </p>
    {% endif %}
    {% endblock %}
</body>
</html>
